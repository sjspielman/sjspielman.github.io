<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ site.title }}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css">

  <link rel="stylesheet" href="{{ '/style.css' | relative_url }}">

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-Y8MLDM2CP4"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-Y8MLDM2CP4');
  </script>
</head>
<body>

  <nav id="navbar">
    <div class="nav-inner">
      <a href="#" class="nav-brand">Stephanie J. Spielman, PhD</a>
      <div class="nav-links">
        {% for item in site.nav %}
        <a href="#{{ item.id }}">{{ item.label }}</a>
        {% endfor %}
      </div>
    </div>
  </nav>

  {{ content }}

  <footer>
    <div class="container">
      <p>
        Stephanie J. Spielman, PhD
        &middot;
        <a href="mailto:stephanie.spielman@gmail.com">stephanie.spielman@gmail.com</a>
      </p>
    </div>
  </footer>

</body>
</html>
